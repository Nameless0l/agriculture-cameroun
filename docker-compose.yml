services:
  # ── API principale ──────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - RAG_PERSIST_DIR=/app/data/chroma
      - DEFAULT_REGION=Centre
      - DEFAULT_LANGUAGE=fr
    volumes:
      # ChromaDB persisté en local (ne pas inclure dans l'image)
      - ./data/chroma:/app/data/chroma:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Interface ADK (dev) ─────────────────────────────────────────────────────
  adk-web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RAG_PERSIST_DIR=/app/data/chroma
    volumes:
      - ./data/chroma:/app/data/chroma:rw
    command: ["adk", "web", "--host", "0.0.0.0", "--port", "8000"]
    profiles: ["dev"]

  # ── Ingestion RAG (job one-shot) ────────────────────────────────────────────
  ingest:
    build: .
    env_file:
      - .env
    environment:
      - RAG_PERSIST_DIR=/app/data/chroma
    volumes:
      - ./data:/app/data:rw
    command: ["python", "-m", "agriculture_cameroun.rag.ingest", "--reset"]
    profiles: ["ingest"]
    restart: "no"
